frr defaults traditional
hostname edge
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
ip route 10.10.0.0/24 blackhole
!
! 192.0.2.0/24 is the hijack demo prefix.
! ROA says AS65000 owns it, but edge (AS65001) announces it → origin-invalid.
! The hijack script adds/removes the BGP network statement dynamically.
ip route 192.0.2.0/24 blackhole
!
interface eth1
 ip address 10.0.0.2/30
exit
!
router bgp 65001
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 neighbor 10.0.0.1 remote-as 65000
 neighbor 10.0.0.1 description upstream-router
 !
 address-family ipv4 unicast
  network 10.10.0.0/24
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 soft-reconfiguration inbound
 exit-address-family
 !
 bmp targets raven
  bmp stats interval 5000
  bmp monitor ipv4 unicast pre-policy
  bmp monitor ipv4 unicast post-policy
  bmp connect 172.20.20.1 port 11019 min-retry 1000 max-retry 5000
 exit
exit
!
end