frr defaults traditional
hostname upstream
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
ip route 198.51.100.0/24 blackhole
ip route 203.0.113.0/24 blackhole
ip route 100.64.0.0/24 blackhole
!
! 192.0.2.0/24 is the hijack demo prefix.
! ROA says AS65000 owns it, but upstream does NOT announce it.
! The hijack script makes edge (AS65001) announce it → origin-invalid.
ip route 192.0.2.0/24 blackhole
!
interface eth1
 ip address 10.0.0.1/30
exit
!
router bgp 65000
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 description edge-router
 !
 address-family ipv4 unicast
  network 198.51.100.0/24
  network 203.0.113.0/24
  network 100.64.0.0/24
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 soft-reconfiguration inbound
 exit-address-family
 !
 bmp targets raven
  bmp stats interval 5000
  bmp monitor ipv4 unicast pre-policy
  bmp monitor ipv4 unicast post-policy
  bmp connect 172.20.20.1 port 11019 min-retry 1000 max-retry 5000
 exit
exit
!
end