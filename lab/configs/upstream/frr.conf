frr defaults traditional
hostname upstream
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
ip route 198.51.100.0/24 blackhole
ip route 203.0.113.0/24 blackhole
ip route 100.64.0.0/24 blackhole
ip route 10.10.0.0/24 blackhole
!
! Only allow 193.0.0.0/21 from internet (AS2121) — deny everything else outbound to internet
ip prefix-list TO-INTERNET deny 0.0.0.0/0 le 32
ip prefix-list TO-INTERNET permit 0.0.0.0/0 ge 0
!
interface eth1
 ip address 10.0.1.2/30
exit
!
interface eth2
 ip address 10.0.0.1/30
exit
!
router bgp 65000
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 neighbor 10.0.1.1 remote-as 2121
 neighbor 10.0.1.1 description internet-router
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 description edge-router
 !
 address-family ipv4 unicast
  network 198.51.100.0/24
  network 203.0.113.0/24
  network 100.64.0.0/24
  network 10.10.0.0/24
  neighbor 10.0.1.1 activate
  neighbor 10.0.1.1 soft-reconfiguration inbound
  neighbor 10.0.1.1 route-map TO-INTERNET-OUT out
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 soft-reconfiguration inbound
 exit-address-family
 !
 bmp targets raven
  bmp stats interval 5000
  bmp monitor ipv4 unicast post-policy
  bmp connect 172.20.20.1 port 11019 min-retry 1000 max-retry 5000
 exit
exit
!
route-map TO-INTERNET-OUT permit 10
 match ip address prefix-list TO-INTERNET
exit
!
end
