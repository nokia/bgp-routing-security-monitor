# RAVEN Demo Lab
#
#   upstream (FRR, AS65000) в”Җв”ҖeBGPв”Җв”Җ edge (FRR, AS65001)
#       в”Ӯ                                в”Ӯ
#       в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҖBMPв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶ RAVEN (host) в—Җв”Җв”Җ RTR в”Җв”Җ Routinator (Docker)
#                                         в–І
#                  BMPв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# Routinator runs as a standalone Docker container (not managed by containerlab)

name: raven-demo

topology:
  nodes:
    upstream:
      kind: linux
      image: quay.io/frrouting/frr:10.2.5
      binds:
        - configs/upstream/daemons:/etc/frr/daemons
        - configs/upstream/frr.conf:/etc/frr/frr.conf
        - configs/upstream/vtysh.conf:/etc/frr/vtysh.conf

    edge:
      kind: linux
      image: quay.io/frrouting/frr:10.2.5
      binds:
        - configs/edge/daemons:/etc/frr/daemons
        - configs/edge/frr.conf:/etc/frr/frr.conf
        - configs/edge/vtysh.conf:/etc/frr/vtysh.conf

  links:
    - endpoints: ["upstream:eth1", "edge:eth1"]