name: raven-demo

topology:
  nodes:
    internet:
      kind: linux
      image: quay.io/frrouting/frr:10.2.5
      binds:
        - configs/internet/daemons:/etc/frr/daemons
        - configs/internet/frr.conf:/etc/frr/frr.conf
        - configs/internet/vtysh.conf:/etc/frr/vtysh.conf

    upstream:
      kind: linux
      image: quay.io/frrouting/frr:10.2.5
      binds:
        - configs/upstream/daemons:/etc/frr/daemons
        - configs/upstream/frr.conf:/etc/frr/frr.conf
        - configs/upstream/vtysh.conf:/etc/frr/vtysh.conf

    edge:
      kind: linux
      image: quay.io/frrouting/frr:10.2.5
      binds:
        - configs/edge/daemons:/etc/frr/daemons
        - configs/edge/frr.conf:/etc/frr/frr.conf
        - configs/edge/vtysh.conf:/etc/frr/vtysh.conf

  links:
    - endpoints: ["internet:eth1", "upstream:eth1"]
    - endpoints: ["upstream:eth2", "edge:eth1"]